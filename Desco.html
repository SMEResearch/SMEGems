<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--n:#0a1628;--d:#0f2042;--a:#00d4aa;--o:#ff6b35;--g:#ffd700;--w:#f0f4f8;--m:#8899aa;--gl:rgba(255,255,255,0.04);--b:rgba(0,212,170,0.15);--r:#ff4757;--gr:#2ed573}
body{font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(135deg,var(--n),var(--d),#0a1a2e);color:var(--w);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
/* Animated BG */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-grid{position:absolute;inset:0;opacity:.025;background-image:linear-gradient(var(--a) 1px,transparent 1px),linear-gradient(90deg,var(--a) 1px,transparent 1px);background-size:60px 60px}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 20s ease-in-out infinite}
.bg-orb.o1{width:300px;height:300px;background:rgba(0,212,170,.04);top:10%;left:10%;animation-delay:0s}
.bg-orb.o2{width:250px;height:250px;background:rgba(255,215,0,.03);top:60%;right:5%;animation-delay:-7s}
.bg-orb.o3{width:200px;height:200px;background:rgba(255,107,53,.03);bottom:10%;left:30%;animation-delay:-14s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}25%{transform:translate(30px,-20px)}50%{transform:translate(-20px,30px)}75%{transform:translate(20px,10px)}}
.particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:var(--a);border-radius:50%;opacity:.3;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.3}90%{opacity:.3}100%{transform:translateY(-10vh) scale(1);opacity:0}}
/* Pipe flow at bottom */
.pipe{position:fixed;bottom:0;left:0;right:0;height:3px;z-index:50;overflow:hidden;opacity:.4}
.pipe-g{width:80px;height:3px;background:linear-gradient(90deg,transparent,var(--a),transparent);border-radius:2px;animation:pf 4s linear infinite}
@keyframes pf{0%{transform:translateX(-80px)}100%{transform:translateX(100vw)}}
/* Top nav */
.tn{position:sticky;top:0;z-index:100;padding:12px 16px;background:rgba(10,22,40,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
.tn .br{font-size:18px;font-weight:800;color:var(--a)}
.tn .sn{font-size:15px;color:var(--m);margin-left:8px}
.tn .ct{font-size:14px;color:var(--m);margin-right:8px}
.mb{background:var(--gl);border:1px solid var(--b);border-radius:8px;padding:8px 14px;color:var(--a);font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
/* Bottom nav */
.bn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,22,40,.95);backdrop-filter:blur(14px);border-top:1px solid var(--b);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.nb{padding:12px 20px;border-radius:10px;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:all .3s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.nb.on{background:var(--a);color:var(--n)}.nb.off{background:var(--gl);color:var(--m);opacity:.4;cursor:default}
.ds{display:flex;gap:4px;overflow:hidden;flex:1;justify-content:center;max-width:180px}
.dt{width:6px;height:6px;border-radius:50%;cursor:pointer;transition:all .3s;flex-shrink:0}
.dt.c{background:var(--a);box-shadow:0 0 6px rgba(0,212,170,.4)}.dt.v{background:rgba(0,212,170,.35)}.dt.f{background:rgba(255,255,255,.08)}
/* Menu */
.mo{position:fixed;inset:0;z-index:200;background:rgba(10,22,40,.96);backdrop-filter:blur(20px);padding:60px 20px 20px;overflow-y:auto;display:none}
.mo.open{display:block}
.mc{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--a);font-size:28px;cursor:pointer}
.mi{display:block;width:100%;padding:14px 18px;border-radius:10px;text-align:left;cursor:pointer;background:transparent;border:1px solid transparent;color:var(--m);font-size:17px;font-weight:400;transition:all .2s;font-family:inherit;margin-bottom:4px}
.mi.act{background:rgba(0,212,170,.08);border-color:rgba(0,212,170,.25);color:var(--a);font-weight:700}
/* Content */
.ct-w{max-width:840px;margin:0 auto;padding:24px 16px 100px;position:relative;z-index:1}
/* Components */
.cd{background:var(--gl);border:1px solid var(--b);border-radius:14px;padding:22px 24px;backdrop-filter:blur(10px);margin-bottom:14px;line-height:1.6}
.cd.ac{background:linear-gradient(135deg,rgba(0,212,170,.07),rgba(0,212,170,.02));border-color:rgba(0,212,170,.25)}
.mx{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px}
.mt{background:var(--gl);border:1px solid var(--b);border-radius:12px;padding:16px 18px;text-align:center;flex:1 1 130px;min-width:120px}
.mt .l{font-size:13px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.mt .v{font-size:26px;font-weight:800;line-height:1.1}
.mt .s{font-size:13px;color:var(--m);margin-top:4px}
.st{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.st span{font-size:28px!important}
.st h2{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:0}
.st .ln{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,212,170,.25),transparent);margin-left:8px}
.bw{margin-bottom:12px}.bl{display:flex;justify-content:space-between;font-size:15px;color:var(--m);margin-bottom:4px;font-weight:500}
.bt{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1);width:0}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
table{width:100%;border-collapse:collapse;font-size:15px}
th{padding:10px 8px;text-align:right;color:var(--m);font-weight:600;font-size:13px;border-bottom:1px solid var(--b)}
td{padding:10px 8px;text-align:right;color:var(--m);border-bottom:1px solid rgba(0,212,170,.05)}
td:first-child,th:first-child{text-align:left}td:first-child{color:var(--w);font-weight:600}
.tb{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tbtn{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--b);background:var(--gl);color:var(--m);transition:all .3s;font-family:inherit}
.tbtn.on{background:var(--a);color:var(--n);border-color:var(--a)}
.tg{padding:6px 12px;background:rgba(0,212,170,.06);border:1px solid var(--b);border-radius:7px;font-size:14px;display:inline-block;margin:3px}
.co{padding:12px 14px;border-radius:8px;font-size:14px;line-height:1.6;margin-top:8px}
.co.or{background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);color:var(--o)}
.co.gr{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);color:var(--a)}
.pc{cursor:pointer}.pd{margin-top:8px;font-size:15px;color:var(--m);line-height:1.6;border-top:1px solid var(--b);padding-top:8px;display:none}
.pc.ex .pd{display:block}
.rs{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;display:inline-block}
.cv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:78vh;text-align:center;position:relative}
.cg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,170,.04),transparent 70%);filter:blur(60px);pointer-events:none}
.svg-c{overflow-x:auto;overflow-y:hidden}
@media(max-width:600px){.mx{gap:8px}.mt{min-width:100px;padding:12px 10px}.mt .v{font-size:22px}.st h2{font-size:22px}.st span{font-size:24px!important}.g2{grid-template-columns:1fr}.cv h1{font-size:46px!important}.ds{max-width:120px}.nb{padding:10px 16px;font-size:15px}}
@media(max-width:380px){.mt{min-width:85px;padding:10px 8px}.mt .v{font-size:20px}.mt .l{font-size:11px}.ds{max-width:90px;gap:2px}.dt{width:5px;height:5px}}
</style>
</head>

function sft(id,btn){['pl','bs','cf'].forEach(t=>{const e=document.getElementById('f-'+t);if(e)e.style.display='none'});document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));const e=document.getElementById('f-'+id);if(e)e.style.display='block';btn.classList.add('on');ab()}

function ab(){setTimeout(()=>{document.querySelectorAll('.bf').forEach(b=>{const w=b.style.width;b.style.width='0';setTimeout(()=>b.style.width=w,80)})},30)}

function render(){
  const s=S[cur];
  document.getElementById('sn').textContent=s.n;
  document.getElementById('ct').textContent=`${cur+1}/${S.length}`;
  document.getElementById('sc').innerHTML=SL[s.id]();
  ab();
  const pb=document.getElementById('pb'),xb=document.getElementById('xb');
  pb.className='nb '+(cur===0?'off':'on');pb.disabled=cur===0;
  xb.className='nb '+(cur===S.length-1?'off':'on');xb.disabled=cur===S.length-1;
  document.getElementById('ds').innerHTML=S.map((_,i)=>`<div class="dt ${i===cur?'c':i<cur?'v':'f'}" onclick="go(${i})"></div>`).join('');
  document.getElementById('mis').innerHTML=S.map((s,i)=>`<button class="mi${i===cur?' act':''}" onclick="go(${i});tm()"><span style="color:var(--m);margin-right:10px;font-size:15px">${String(i+1).padStart(2,'0')}</span>${s.n}</button>`).join('');
  window.scrollTo(0,0);
}
function go(i){cur=i;render()}
function pv(){if(cur>0){cur--;render()}}
function nx(){if(cur<S.length-1){cur++;render()}}
function tm(){document.getElementById('mo').classList.toggle('open')}

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nx();if(e.key==='ArrowLeft')pv();if(e.key==='Escape')document.getElementById('mo').classList.remove('open')});
// Swipe — moderated threshold
let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  const dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>100 && Math.abs(dy)<80){dx<0?nx():pv()}
},{passive:true});

render();
</script>
