function sft(id,btn){['pl','bs','cf'].forEach(t=>{const e=document.getElementById('f-'+t);if(e)e.style.display='none'});document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));const e=document.getElementById('f-'+id);if(e)e.style.display='block';btn.classList.add('on');ab()}

function ab(){setTimeout(()=>{document.querySelectorAll('.bf').forEach(b=>{const w=b.style.width;b.style.width='0';setTimeout(()=>b.style.width=w,80)})},30)}

function render(){
  const s=S[cur];
  document.getElementById('sn').textContent=s.n;
  document.getElementById('ct').textContent=`${cur+1}/${S.length}`;
  document.getElementById('sc').innerHTML=SL[s.id]();
  ab();
  const pb=document.getElementById('pb'),xb=document.getElementById('xb');
  pb.className='nb '+(cur===0?'off':'on');pb.disabled=cur===0;
  xb.className='nb '+(cur===S.length-1?'off':'on');xb.disabled=cur===S.length-1;
  document.getElementById('ds').innerHTML=S.map((_,i)=>`<div class="dt ${i===cur?'c':i<cur?'v':'f'}" onclick="go(${i})"></div>`).join('');
  document.getElementById('mis').innerHTML=S.map((s,i)=>`<button class="mi${i===cur?' act':''}" onclick="go(${i});tm()"><span style="color:var(--m);margin-right:10px;font-size:15px">${String(i+1).padStart(2,'0')}</span>${s.n}</button>`).join('');
  window.scrollTo(0,0);
}
function go(i){cur=i;render()}
function pv(){if(cur>0){cur--;render()}}
function nx(){if(cur<S.length-1){cur++;render()}}
function tm(){document.getElementById('mo').classList.toggle('open')}

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nx();if(e.key==='ArrowLeft')pv();if(e.key==='Escape')document.getElementById('mo').classList.remove('open')});
// Swipe — moderated threshold
let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  const dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>100 && Math.abs(dy)<80){dx<0?nx():pv()}
},{passive:true});

render();
</script>
