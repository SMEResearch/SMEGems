<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viviana Power Tech — Hidden Champions 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--panel:#0b111a;--card:#101725;--card2:#151f33;--border:#1e293b;--border2:#334155;
  --accent:#3b82f6;         /* primary: electric blue */
  --accent-d:rgba(59,130,246,.09);
  --gold:#f59e0b;           /* secondary: warm amber/gold */
  --gold-d:rgba(245,158,11,.08);
  --teal:#10b981;           /* tertiary: emerald */
  --green:#22c55e;          /* quaternary: green */
  --red:#ef4444;--blue:#3b82f6;
  --text:#f8fafc;--body:#94a3b8;--muted:#64748b;--dim:#1e293b;
  --sans:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100dvh;width:100vw;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:16px}

/* ── BG ── */
#bgc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.25}

/* ── PROGRESS ── */
#prog{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--gold));z-index:1000;width:0%;transition:width .1s}

/* ── SHELL ── */
#shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;width:100vw}

/* ── TOPBAR ── */
#tb{flex-shrink:0;height:54px;background:rgba(8,9,15,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;z-index:90}
#mbtn{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;color:var(--text);padding:7px 14px;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;transition:all .2s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
#mbtn:hover{border-color:var(--accent);color:var(--accent)}
.tb-t{font-family:var(--mono);font-size:11px;color:var(--body);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.05em}
.tb-t span{color:var(--accent)}
.xbtn{display:flex;align-items:center;gap:5px;flex-shrink:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:6px 12px;text-decoration:none;font-family:var(--mono);font-size:11px;color:var(--body);transition:all .2s;letter-spacing:.03em}
.xbtn:hover{border-color:var(--accent);color:var(--accent)}
.xbtn svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}
.badge{display:flex;align-items:center;gap:6px;flex-shrink:0;background:rgba(59,130,246,.1);padding:5px 12px;border-radius:var(--r);border:1px solid rgba(59,130,246,.25)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blbl{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.1em}

/* ── SCROLL AREA ── */
#sa{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;padding:28px clamp(14px,3.5vw,52px);scrollbar-width:thin;scrollbar-color:var(--border2) transparent;-webkit-overflow-scrolling:touch}
#sa::-webkit-scrollbar{width:4px}
#sa::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#pg{max-width:1040px;margin:0 auto;width:100%;animation:fu .28s cubic-bezier(.16,1,.3,1)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── PILL TABS NAV ── */
#bn{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:8px 14px;z-index:90;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#bn::-webkit-scrollbar{display:none}
#bn-p,#bn-n{flex-shrink:0;background:var(--card);border:1px solid var(--border2);color:var(--body);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
#bn-p:hover:not(:disabled),#bn-n:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
#bn-p:disabled,#bn-n:disabled{opacity:.2;cursor:not-allowed}
#bn-tabs{flex:1;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;align-items:center}
#bn-tabs::-webkit-scrollbar{display:none}
.nt{flex-shrink:0;padding:6px 14px;border-radius:20px;font-family:var(--mono);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.nt:hover{border-color:var(--border2);color:var(--body)}
.nt.act{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.1)}

/* ── TOC ── */
#toc{position:fixed;inset:0;background:rgba(8,9,15,.97);backdrop-filter:blur(12px);z-index:9999;display:none;flex-direction:column;padding:28px clamp(14px,3.5vw,52px);overflow-y:auto}
#toc.open{display:flex}
.toc-h{max-width:860px;margin:0 auto 20px;width:100%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:16px}
.toc-h h2{font-size:20px;font-weight:700;color:var(--text)}.toc-h h2 em{color:var(--accent);font-style:normal}
#tcl{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
#tcl:hover{color:var(--red);border-color:var(--red)}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;max-width:860px;margin:0 auto;width:100%}
.ti{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--dim);padding:14px 16px;border-radius:var(--r);cursor:pointer;transition:all .2s}
.ti:hover,.ti.act{border-left-color:var(--accent);border-color:rgba(59,130,246,.3)}
.ti-n{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px}
.ti:hover .ti-n,.ti.act .ti-n{color:var(--accent)}
.ti-t{font-size:14px;font-weight:600;color:var(--text)}

/* ── TYPOGRAPHY ── */
.ey{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.ey::after{content:'';height:1px;width:28px;background:var(--accent)}

h1.ph{font-family:var(--sans);font-size:clamp(22px,3.2vw,36px);font-weight:700;line-height:1.2;color:var(--text);margin-bottom:10px;letter-spacing:-.3px}
h1.ph em{color:var(--accent);font-style:normal}

.sub{font-size:15px;color:var(--body);margin-bottom:22px;line-height:1.75}
.sh{font-size:15px;font-weight:700;color:var(--text);margin:22px 0 14px;display:flex;align-items:center;gap:10px}
.sh::after{content:'';height:1px;flex:1;background:var(--border2)}

/* ── KPI BAND ── */
.kband{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:0}
@media(max-width:580px){.kband{grid-template-columns:repeat(3,1fr)}}
.kb{padding:13px 11px;background:rgba(16,23,37,.7);border:1px solid var(--border);border-radius:var(--r)}
.kb-l{font-family:var(--mono);font-size:9px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.kb-v{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}
.kb-n{font-size:9.5px;margin-top:4px;color:var(--body)}

/* ── KPI CARDS ── */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:11px;margin-bottom:22px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:border .2s}
.kc:hover{border-color:var(--border2)}
.kc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--dim);transition:background .25s}
.kc:hover::before,.kc.v::before{background:var(--accent)}
.kc.a::before{background:var(--gold)}.kc.r::before{background:var(--red)}.kc.b::before{background:var(--teal)}
.kl{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--body);margin-bottom:8px}
.kv{font-family:var(--mono);font-size:23px;font-weight:700;color:var(--text);line-height:1}
.kv.v{color:var(--accent)}.kv.a{color:var(--gold)}.kv.r{color:var(--red)}.kv.b{color:var(--teal)}
.kn{font-size:12px;color:var(--body);margin-top:7px}

/* ── VOLT METERS ── */
.vmg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.vm{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 14px;text-align:center}
.vml{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.vmv{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--text);line-height:1}
.vm.v .vmv{color:var(--accent)}.vm.a .vmv{color:var(--gold)}.vm.r .vmv{color:var(--red)}.vm.b .vmv{color:var(--teal)}
.vms{font-family:var(--mono);font-size:10px;color:var(--body);margin-top:8px}

/* ── CONTENT CARDS ── */
.cc{background:rgba(16,23,37,.5);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:border .2s}
.cc:hover{border-color:var(--border2)}
.cc-h{font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cc-b{font-size:14px;line-height:1.75;color:var(--body)}

/* ── HIGHLIGHTS ── */
.hl{border:1px solid var(--border);border-left:4px solid var(--accent);background:rgba(59,130,246,.04);padding:14px 18px;border-radius:0 var(--r) var(--r) 0;font-size:14px;color:var(--text);line-height:1.75;margin-bottom:12px}
.hl.w{border-left-color:var(--red);background:rgba(239,68,68,.04)}
.hl.a{border-left-color:var(--gold);background:rgba(245,158,11,.04)}
.hl.b{border-left-color:var(--teal);background:rgba(16,185,129,.04)}
.hl.s{border-left-color:var(--dim);background:rgba(255,255,255,.015)}

/* ── TABLES — THE INFALLIBLE HARD-CODED WIDTH APPROACH ── */
.tw {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: var(--r);
  border: 1px solid var(--border);
  margin-bottom: 20px;
  background: var(--card);
}
table {
  width: 100%;
  min-width: 760px; /* Triggers scroll on mobile to prevent illegible text */
  border-collapse: collapse;
  table-layout: fixed; /* BROWSER MUST OBEY INLINE PERCENTAGES */
}
th, td {
  padding: 14px 12px;
  text-align: left;
  vertical-align: top;
  line-height: 1.5;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
th {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--body);
  background: #0f1623;
  border-bottom: 2px solid var(--border2);
}
td {
  font-family: var(--sans);
  font-size: 13.5px;
  color: var(--body);
  border-bottom: 1px solid var(--border);
}
td:first-child { color: var(--text); font-weight: 500; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(59,130,246,.03); }
th.r, td.r { text-align: right; }
.tg{color:var(--accent)!important}.ta{color:var(--gold)!important}.tr{color:var(--red)!important}.tb{color:var(--teal)!important}.tm{color:var(--muted)!important;font-style:italic}

/* ── TAGS ── */
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.tag{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border);background:var(--card);color:var(--body)}
.tag.v{color:var(--accent);border-color:rgba(59,130,246,.3)}.tag.a{color:var(--gold);border-color:rgba(245,158,11,.3)}.tag.r{color:var(--red);border-color:rgba(239,68,68,.3)}.tag.b{color:var(--teal);border-color:rgba(16,185,129,.3)}

/* ── BARS ── */
.br{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.brl{font-size:13px;font-weight:500;color:var(--text);width:120px;flex-shrink:0;text-align:right}
.brt{flex:1;background:var(--card2);border-radius:3px;height:15px;overflow:hidden;position:relative}
.brf{height:100%;transition:width 1.4s cubic-bezier(.22,1,.36,1);width:0%;position:absolute;top:0;left:0}
.brv{width:90px;flex-shrink:0;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--body);padding-left:8px}

/* ── SCENARIOS ── */
.scg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:560px){.scg{grid-template-columns:1fr}}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;border-top:3px solid var(--dim)}
.sc.bull{border-top-color:var(--green)}.sc.base{border-top-color:var(--gold)}.sc.bear{border-top-color:var(--red)}
.sc-h{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.sc-pat{font-family:var(--mono);font-size:13px;font-weight:600;margin-bottom:4px;color:var(--body)}
.sc-tgt{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1;margin-bottom:12px;letter-spacing:-0.5px;}
.sc.bull .sc-tgt{color:var(--green)}.sc.base .sc-tgt{color:var(--gold)}.sc.bear .sc-tgt{color:var(--red)}
.sc-b{font-size:13px;line-height:1.72;color:var(--body)}

/* ── GRID 2 ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;min-width:0}
.g2>*{min-width:0}
@media(max-width:560px){.g2{grid-template-columns:1fr}}

/* ── TIMELINE ── */
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--border2)}
.tli{position:relative;margin-bottom:18px}
.tli::before{content:'';position:absolute;left:-20px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tli.a::before{background:var(--gold)}.tli.r::before{background:var(--red)}.tli.b::before{background:var(--teal)}
.tl-d{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
.tl-t{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-b{font-size:13.5px;color:var(--body);line-height:1.65}

/* ── CHART WRAP ── */
.cw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
canvas.ch{display:block}

/* ── NOTICE ── */
.notice{background:rgba(255,255,255,.015);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--r);padding:20px;font-size:14px;color:var(--body);line-height:1.75}
.notice strong{color:var(--text)}

/* ── Q3 BADGE ── */
.q3badge{display:inline-flex;align-items:center;gap:7px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:var(--r);padding:6px 14px;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.05em;margin-bottom:16px}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div id="prog"></div>

<div id="toc">
  <div class="toc-h">
    <h2>VIVIANA <em>POWER TECH</em> — SECTIONS</h2>
    <button id="tcl">✕</button>
  </div>
  <div class="tg" id="tgrid"></div>
</div>

<div id="shell">
  <div id="tb">
    <button id="mbtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      INDEX
    </button>
    <div class="tb-t">Hidden Champions · <span>VIVIANA</span></div>
    <div class="badge"><div class="dot"></div><span class="blbl">2026</span></div>
  </div>

  <div id="sa"><div id="pg"></div></div>

  <div id="bn">
    <button id="bn-p" disabled>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="bn-tabs"></div>
    <button id="bn-n">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<script>
// ── BG ─────────────────────────────────────────
const bgC=document.getElementById('bgc'),bgX=bgC.getContext('2d');
let bw,bh,nd=[];
function bgR(){bw=bgC.width=innerWidth;bh=bgC.height=innerHeight;nd=Array.from({length:45},()=>({x:Math.random()*bw,y:Math.random()*bh,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.3+.4}))}
function bgD(){bgX.clearRect(0,0,bw,bh);nd.forEach((n,i)=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>bw)n.vx*=-1;if(n.y<0||n.y>bh)n.vy*=-1;bgX.beginPath();bgX.arc(n.x,n.y,n.r,0,Math.PI*2);bgX.fillStyle='rgba(59,130,246,.4)';bgX.fill();nd.slice(i+1).forEach(m=>{const d=Math.hypot(n.x-m.x,n.y-m.y);if(d<110){bgX.beginPath();bgX.moveTo(n.x,n.y);bgX.lineTo(m.x,m.y);bgX.strokeStyle=`rgba(59,130,246,${.1*(1-d/110)})`;bgX.lineWidth=.4;bgX.stroke()}})});requestAnimationFrame(bgD)}
addEventListener('resize',bgR);bgR();bgD();

const SA=document.getElementById('sa');
SA.addEventListener('scroll',()=>{const h=SA.scrollHeight-SA.clientHeight;document.getElementById('prog').style.width=(h>0?SA.scrollTop/h*100:0)+'%'});

const SECS=[
  {id:'cover',l:'01·Cover'},{id:'business',l:'02·Business'},
  {id:'segments',l:'03·Segments'},{id:'financials',l:'04·Financials'},
  {id:'orderbook',l:'05·Orders'},{id:'bess',l:'06·BESS'},
  {id:'capital',l:'07·Capital'},{id:'price',l:'08·Price'},
  {id:'mainboard',l:'09·Mainboard'},{id:'peers',l:'10·Peers'},
  {id:'risks',l:'11·Risks'},{id:'scenarios',l:'12·Scenarios'},
  {id:'disclaimer',l:'13·Disclaimer'},
];
const FULL={
  cover:'01 · Cover & Snapshot',business:'02 · Business Overview',
  segments:'03 · Business Segments',financials:'04 · Financials',
  orderbook:'05 · Order Book',bess:'06 · BESS',
  capital:'07 · Capital History',price:'08 · Price & Events',
  mainboard:'09 · Mainboard Migration',peers:'10 · Peer Comparison',
  risks:'11 · Risks',scenarios:'12 · Scenarios',
  disclaimer:'13 · Disclaimer'
};
let ci=0;

function buildTabs(){
  const c=document.getElementById('bn-tabs');c.innerHTML='';
  SECS.forEach((s,i)=>{const b=document.createElement('button');b.className='nt'+(i===ci?' act':'');b.textContent=s.l;b.onclick=()=>{ci=i;render()};c.appendChild(b)});
  const act=c.querySelector('.act');if(act)act.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}
function openTOC(){
  const g=document.getElementById('tgrid');g.innerHTML='';
  SECS.forEach((s,i)=>{const e=document.createElement('div');e.className='ti'+(i===ci?' act':'');e.innerHTML=`<div class="ti-n">${s.id.toUpperCase()}</div><div class="ti-t">${FULL[s.id]}</div>`;e.onclick=()=>{ci=i;render();closeTOC()};g.appendChild(e)});
  document.getElementById('toc').classList.add('open');
}
function closeTOC(){document.getElementById('toc').classList.remove('open')}
document.getElementById('mbtn').onclick=openTOC;
document.getElementById('tcl').onclick=closeTOC;
document.getElementById('bn-p').onclick=()=>{if(ci>0){ci--;render()}};

function render(){

  document.querySelector('.tb-t').innerHTML=`Hidden Champions · <span>${FULL[SECS[ci].id]}</span>`;

    disclaimer:sDisclaimer};
  return m[id]?m[id]():'<p>Not found</p>';

function drawRevChart(){
  const cv=document.getElementById('revChart');if(!cv)return;
  let W=Math.max(cv.parentElement.offsetWidth-36,340),H=188;
  if(W<=0){requestAnimationFrame(drawRevChart);return}
  const d=dpr();cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(d,d);
  const lbls=['FY22','FY23','FY24','FY25','FY26E','FY27P'],rev=[33,36,66,219,560,900],pat=[3,3,6.6,19.8,56,90];
  const pad={t:16,r:75,b:26,l:40},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,n=lbls.length,mx=950;
  const bw=Math.min(cw/(n*2.8),24);
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(1-i/4);
    ctx.strokeStyle='rgba(59,130,246,.07)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    ctx.fillStyle='#64748b';ctx.font=`500 9.5px 'IBM Plex Mono',monospace`;ctx.textAlign='right';ctx.fillText(Math.round(mx*i/4),pad.l-4,y+3.5);
  }
  lbls.forEach((l,i)=>{
    const gx=pad.l+i*(cw/n)+cw/(n*2),isP=i>=4;
    const rh=(rev[i]/mx)*ch,ph=(pat[i]/mx)*ch;
    ctx.fillStyle=isP?'rgba(245,158,11,.15)':'rgba(59,130,246,.15)';ctx.fillRect(gx-bw-1,pad.t+ch-rh,bw,rh);
    ctx.fillStyle=isP?'#f59e0b':'#3b82f6';ctx.fillRect(gx-bw-1,pad.t+ch-rh,bw,2);
    ctx.fillStyle='rgba(16,185,129,.15)';ctx.fillRect(gx+2,pad.t+ch-ph,bw,ph);
    ctx.fillStyle='#10b981';ctx.fillRect(gx+2,pad.t+ch-ph,bw,2);
    ctx.fillStyle='#94a3b8';ctx.font=`500 9.5px 'IBM Plex Mono',monospace`;ctx.textAlign='center';ctx.fillText(l,gx,H-pad.b+14);
  });
  [[W-16,pad.t,'#3b82f6','Revenue'],[W-16,pad.t+17,'#10b981','PAT'],[W-16,pad.t+34,'#f59e0b','Projected']].forEach(([x,y,c,lbl])=>{
    ctx.fillStyle=c;ctx.fillRect(x,y,9,9);ctx.fillStyle='#f8fafc';ctx.font=`500 10px 'Inter',sans-serif`;ctx.textAlign='right';ctx.fillText(lbl,x-5,y+8);
  });
}

function drawPriceChart(){
  const cv=document.getElementById('priceChart');if(!cv)return;
  const PD=window._PD||[];if(!PD.length)return;
  let W=Math.max(cv.parentElement.offsetWidth-36,340),H=225;
  if(W<=0){requestAnimationFrame(drawPriceChart);return}
  const d=dpr();cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(d,d);
  const pad={t:16,r:16,b:32,l:50},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const vals=PD.map(x=>x.c),mn=Math.min(...vals)*.9,mx=Math.max(...vals)*1.06;
  const ec={pa1:'#f59e0b',lockin:'#10b981',peak:'#3b82f6',bonus:'#3b82f6',q3:'#ef4444',mb:'#3b82f6',ncd:'#f59e0b'};

  function render(hx=null){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<=4;i++){
      const y=pad.t+ch*(1-i/4);
      ctx.strokeStyle='rgba(59,130,246,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
      ctx.fillStyle='#64748b';ctx.font=`500 9.5px 'IBM Plex Mono',monospace`;ctx.textAlign='right';
      ctx.fillText('₹'+Math.round(mn+(mx-mn)*(i/4)),pad.l-4,y+3.5);
    }
    const pts=PD.map((p,i)=>({x:pad.l+(i/(PD.length-1))*cw,y:pad.t+ch*(1-(p.c-mn)/(mx-mn)),data:p}));
    ctx.beginPath();pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
    ctx.lineTo(pad.l+cw,pad.t+ch);ctx.lineTo(pad.l,pad.t+ch);ctx.closePath();
    const g=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);g.addColorStop(0,'rgba(59,130,246,.15)');g.addColorStop(1,'rgba(59,130,246,0)');ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.7;ctx.lineJoin='round';pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));ctx.stroke();
    const step=W<480?Math.ceil(PD.length/4):Math.ceil(PD.length/7);
    ctx.fillStyle='#94a3b8';ctx.font=`500 9.5px 'IBM Plex Mono',monospace`;ctx.textAlign='center';
    pts.forEach((pt,i)=>{if(i%step===0)ctx.fillText(pt.data.d,pt.x,H-pad.b+16)});
    pts.forEach(pt=>{
      if(pt.data.ev){
        const c=ec[pt.data.ev]||'#3b82f6';
        ctx.beginPath();ctx.setLineDash([2,4]);ctx.moveTo(pt.x,pt.y+7);ctx.lineTo(pt.x,pad.t+ch);ctx.strokeStyle=c+'60';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
        ctx.beginPath();ctx.arc(pt.x,pt.y,4.5,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
        ctx.beginPath();ctx.arc(pt.x,pt.y,12,0,Math.PI*2);ctx.fillStyle=c+'20';ctx.fill();
      }
    });
    if(hx!==null&&hx>=pad.l&&hx<=pad.l+cw){
      let cl=pts[0],md=Math.abs(hx-pts[0].x);pts.forEach(pt=>{const dd=Math.abs(hx-pt.x);if(dd<md){md=dd;cl=pt}});
      ctx.beginPath();ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.moveTo(cl.x,pad.t);ctx.lineTo(cl.x,pad.t+ch);ctx.stroke();
      ctx.beginPath();ctx.arc(cl.x,cl.y,4.5,0,Math.PI*2);ctx.fillStyle='#f8fafc';ctx.fill();
      const txt=`${cl.data.d}: ₹${cl.data.c}`,et=cl.data.desc||'';
      ctx.font=`500 9.5px 'IBM Plex Mono',monospace`;
      const tw=Math.max(ctx.measureText(txt).width,et?ctx.measureText(et).width:0)+14,th=et?34:19;
      let tx=cl.x-tw/2;if(tx<pad.l)tx=pad.l;if(tx+tw>pad.l+cw)tx=pad.l+cw-tw;
      let ty=cl.y-th-11;if(ty<pad.t)ty=cl.y+13;
      ctx.fillStyle='rgba(8,9,15,.96)';ctx.strokeStyle=cl.data.ev?(ec[cl.data.ev]||'#3b82f6'):'#334155';ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(tx,ty,tw,th,3);ctx.fill();ctx.stroke();
      ctx.fillStyle='#f8fafc';ctx.textAlign='center';ctx.fillText(txt,tx+tw/2,ty+12);
      if(et){ctx.fillStyle=ec[cl.data.ev]||'#3b82f6';ctx.fillText(et,tx+tw/2,ty+26)}
    }
  }
  render();
  cv.onmousemove=e=>{const r=cv.getBoundingClientRect();render(e.clientX-r.left)};
  cv.onmouseleave=()=>render(null);
  cv.ontouchmove=e=>{e.preventDefault();const r=cv.getBoundingClientRect();render(e.touches[0].clientX-r.left)};
  cv.ontouchend=()=>render(null);
}

function drawCharts(id){
  if(id==='financials')drawRevChart();
  if(id==='price')drawPriceChart();
}
addEventListener('resize',()=>{
  const h=document.getElementById('pg').innerHTML;
  if(h.includes('revChart'))drawRevChart();
  if(h.includes('priceChart'))drawPriceChart();
});

render();
</script>
