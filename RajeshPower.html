<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rajesh Power Services — Investor Research 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Fira+Code:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* CYBER-GRID POWER THEME */
  --bg: #03050a;          
  --panel: #070b14;       
  --card: rgba(12, 18, 30, 0.7); 
  --card2: #0f172a;       
  --border: #1e293b;      
  --border2: #334155;     
  
  /* Power Indicators - Toned Down */
  --elec: #38bdf8;        
  --elec-dim: rgba(56, 189, 248, 0.1);
  --elec-glow: 0 0 8px rgba(56, 189, 248, 0.2);
  --volt: #facc15;        
  --volt-dim: rgba(250, 204, 21, 0.1);
  --live: #f43f5e;        
  --green: #10b981;       
  
  /* Text */
  --text: #f8fafc;        
  --body: #94a3b8;        
  --muted: #64748b;       
  --dim: #475569;
  
  --font-sans: 'Exo 2', sans-serif;
  --font-mono: 'Fira Code', monospace;
  --font-serif: 'Rajdhani', sans-serif; 
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* STRICT SINGLE PAGE APP - NO VERTICAL SCROLL ON BODY */
html, body {
  height: 100dvh;
  width: 100vw;
  overflow: hidden; 
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

/* OVERRIDE INLINE STYLES */
[style*="color:#fff"] { color: var(--text) !important; text-shadow: none !important; }
.ccard-body strong, .hl strong, .notice strong, .sc-h { color: var(--text) !important; font-weight: 600; text-shadow: none; }
.sec-title, .pg-h1, .kpi-val, .vm-val, .mgmt-name { color: var(--text) !important; }

/* ── PROGRESS BAR ── */
#scroll-progress { position: absolute; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--elec), var(--volt), var(--green)); z-index: 10000; width: 0%; transition: width 0.1s ease-out; }

/* ── ACTIVE POWER GRID BACKGROUND ── */
#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.4}

/* ── LAYOUT (FLEX COLUMN FOR PERFECT MOBILE SIZING) ── */
#shell{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1;width:100%}

/* ── TOPBAR ── */
#topbar{
  background:rgba(3, 5, 10, .98);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:64px;
  display:flex;
  align-items:center;
  gap:16px;
  z-index:90;
  flex-shrink:0;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#menu-btn{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius: 4px;
  cursor:pointer;
  color:var(--text);
  padding:8px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  transition:all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#menu-btn:hover { border-color:var(--elec); color: var(--elec); }
#menu-btn svg { pointer-events: none; }

.tb-bc{font-family:var(--font-mono);font-weight:600;font-size:12px;color:var(--body);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.1em;text-transform:uppercase}
.tb-bc span{color:var(--elec);}
.tb-right{display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(16, 185, 129, 0.1);padding:6px 16px;border-radius:4px;border:1px solid rgba(16, 185, 129, 0.3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.85)}}
.live-label{font-family:var(--font-mono);font-size:11px;color:var(--green);font-weight:700;letter-spacing:1px;}

/* ── SCROLLABLE CONTENT ── */
#content-scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  padding: 40px 48px;
  position: relative;
  z-index: 2;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
  -webkit-overflow-scrolling: touch;
}
#content-scroll-area::-webkit-scrollbar { width: 6px; }
#content-scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 6px; }

#active-section {
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* ── BOTTOM PAGINATION NAVIGATION ── */
#bottom-nav {
  flex-shrink: 0;
  height: 64px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  z-index: 95;
}
.nav-btn {
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover:not(:disabled) { border-color: var(--elec); color: var(--elec); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-indicator {
  font-family: var(--font-mono);
  color: var(--body);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-align: center;
}
.nav-indicator span { color: var(--elec); font-weight: 700; }

/* ── FULL SCREEN TOC MODAL ── */
#toc-modal {
  position: fixed;
  inset: 0;
  background: rgba(3, 5, 10, 0.98);
  backdrop-filter: blur(15px);
  z-index: 9999;
  display: none;
  flex-direction: column;
  padding: 40px 24px;
  overflow-y: auto;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#toc-modal.show { display: flex; opacity: 1; }
.toc-header {
  max-width: 1000px;
  margin: 0 auto 30px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
}
.toc-title {
  font-family: var(--font-serif);
  font-size: 28px;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 2px;
}
#close-toc {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  border-radius: 50%;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
#close-toc:hover { color: var(--live); border-color: var(--live); }
.toc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}
.toc-item {
  background: var(--card2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  padding: 20px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: all 0.2s;
  text-decoration: none;
}
.toc-item:hover { border-color: var(--elec); border-left-color: var(--elec); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
.toc-item.active { background: rgba(56, 189, 248, 0.05); border-color: var(--elec); border-left-color: var(--elec); }
.toc-num { font-family: var(--font-mono); font-size: 12px; color: var(--muted); font-weight: 700; }
.toc-item:hover .toc-num { color: var(--elec); }
.toc-item.active .toc-num { color: var(--elec); }
.toc-text { font-family: var(--font-sans); font-size: 16px; font-weight: 600; color: var(--text); }


/* ── TYPOGRAPHY & COMPONENTS ── */
.pg-eye{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--elec);margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.pg-eye::after{content:'';height:1px;width:60px;background:var(--elec);}
.pg-h1{font-family:var(--font-serif);font-size:clamp(32px, 4vw, 48px);font-weight:700;line-height:1.15;color:var(--text);margin-bottom:16px;letter-spacing:0.5px;text-transform:uppercase}
.pg-h1 em{color:var(--volt);font-style:normal;}
.pg-sub{font-family:var(--font-sans);font-size:16px;color:var(--body);margin-bottom:28px;line-height:1.7;font-weight:400;}
.sec-h{font-family:var(--font-serif);font-size:24px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text);margin:0 0 24px;display:flex;align-items:center;gap:16px;}
.sec-h::after{content:'';height:1px;flex:1;background:var(--border2);opacity:0.5}

/* ── COVER KPIs ── */
.cover-kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 0; }
.cover-kpis .kpi { padding: 16px 14px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 6px; box-shadow: none; }
.cover-kpis .kpi-lbl { font-size: 9px; letter-spacing: 0.5px; margin-bottom: 8px; color: var(--muted); }
.cover-kpis .kpi-val { font-size: 18px; white-space: nowrap; font-weight: 700; color: var(--text); }
.cover-kpis .kpi-note { font-size: 9.5px; margin-top: 8px; color: var(--body); }

/* ── STANDARD KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.kpi{
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: all .2s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.kpi:hover{ border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
.kpi::after{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--dim);transition:all 0.3s}
.kpi:hover::after{background:var(--elec);}
.kpi.v::after{background:var(--volt)}.kpi.g::after{background:var(--green)}.kpi.r::after{background:var(--live)}
.kpi-lbl{font-family:var(--font-mono);font-weight:600;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--body);margin-bottom:12px;}
.kpi-val{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-0.5px;}
.kpi-val.e{color:var(--elec);}
.kpi-val.v{color:var(--volt);}
.kpi-val.g{color:var(--green);}
.kpi-val.r{color:var(--live);}
.kpi-note{font-family:var(--font-sans);font-weight:500;font-size:12px;color:var(--body);margin-top:12px;}

/* ── SUBDUED VOLT METERS (Page 4, 5, 11) ── */
.volt-meter{
    background: #0b1120; 
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 24px;
    text-align: center;
    position: relative;
    transition: all 0.2s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.volt-meter:hover{ 
    transform:translateY(-2px); 
    border-color: var(--border2);
    background: #0f172a;
}
.volt-meter.e:hover { border-color: rgba(56, 189, 248, 0.3); }
.volt-meter.v:hover { border-color: rgba(250, 204, 21, 0.3); }
.volt-meter.g:hover { border-color: rgba(16, 185, 129, 0.3); }

.vm-lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:600}
.vm-val{font-family:var(--font-mono);font-size:36px;font-weight:700;line-height:1;letter-spacing:-0.5px; color: var(--text);}
.volt-meter.e .vm-val { color: var(--elec); }
.volt-meter.v .vm-val { color: var(--volt); }
.volt-meter.g .vm-val { color: var(--green); }
.vm-sub{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--body);margin-top:14px;}

/* ── CONTENT CARDS ── */
.ccard{background:rgba(15, 23, 42, 0.4);border:1px solid var(--border);border-radius:6px;padding:28px;margin-bottom:16px;transition:all .2s ease;}
.ccard:hover{border-color:var(--border2);background:rgba(15, 23, 42, 0.6)}
.ccard-h{font-family:var(--font-serif);font-size:20px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:12px;letter-spacing:0.5px;text-transform:uppercase}
.ccard p, .ccard-body{font-family:var(--font-sans);font-size:15px;line-height:1.75;color:var(--body);}

/* ── HIGHLIGHT ALERTS ── */
.hl{border:1px solid var(--border);border-left:4px solid var(--elec);background:rgba(15, 23, 42, 0.4);padding:18px 22px;border-radius:0 6px 6px 0;font-family:var(--font-sans);font-size:15px;color:var(--text);line-height:1.75;margin-bottom:16px;}
.hl.warn{border-left-color:var(--live); background:rgba(244, 63, 94, 0.05);}
.hl.ok{border-left-color:var(--green); background:rgba(16, 185, 129, 0.05);}
.hl.volt{border-left-color:var(--volt); background:rgba(250, 204, 21, 0.05);}
.hl.sub{border-left-color:var(--dim); background:rgba(255,255,255,0.02)}

/* ── DATA TABLES ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;border-radius:4px;border:1px solid var(--border);margin-bottom:24px;background:#050810;box-shadow:inset 0 0 20px rgba(0,0,0,1)}
table{width:100%;border-collapse:collapse}
thead tr{background:#0f172a;border-bottom:1px solid var(--border2)}
th{font-family:var(--font-mono);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--body);padding:16px 20px;text-align:right;white-space:nowrap;}
th:first-child{text-align:left}
td{padding:14px 20px;text-align:right;border-bottom:1px solid var(--border);color:var(--body);font-family:var(--font-mono);font-size:13px;}
td:first-child{text-align:left;color:var(--text);font-family:var(--font-sans);font-size:14.5px;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.tg{color:var(--green)!important;}.te{color:var(--elec)!important;}.tv{color:var(--volt)!important;}.tr-c{color:var(--live)!important;}.td-c{color:var(--muted)!important;font-style:italic}

/* ── TAGS ── */
.tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.tag{font-family:var(--font-mono);font-size:11px;padding:6px 12px;border-radius:4px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase; border:1px solid var(--border); background: var(--card2); color: var(--body);}
.tag.e{color:var(--elec); border-color: rgba(56, 189, 248, 0.3);}
.tag.v{color:var(--volt); border-color: rgba(250, 204, 21, 0.3);}
.tag.g{color:var(--green); border-color: rgba(16, 185, 129, 0.3);}

/* ── BAR CHART FIX (Flex display for no clipping) ── */
.bar-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.bar-lbl{font-family:var(--font-sans);font-size:14px;font-weight:500;color:var(--text);width:140px;flex-shrink:0;text-align:right;}
.bar-track{flex:1;background:#0f172a;border-radius:4px;height:20px;overflow:hidden; position: relative;}
.bar-fill{height:100%;transition:width 1.5s cubic-bezier(0.22, 1, 0.36, 1);width:0%;position:absolute; top:0; left:0;}
.bar-val { width: 120px; flex-shrink: 0; font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--body); padding-left: 12px;}

/* ── SCENARIO ── */
.scenarios{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px}
.sc{background:#0b1120;border:1px solid var(--border);border-radius:6px;padding:28px;border-top-width:3px;transition:all 0.2s;}
.sc.bull{border-top-color:var(--green);}
.sc.base{border-top-color:var(--elec);}
.sc.bear{border-top-color:var(--live);}
.sc-h{font-family:var(--font-serif);font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:0.5px;text-transform:uppercase}
.sc-p{font-family:var(--font-mono);font-size:26px;font-weight:700;line-height:1;margin-bottom:16px;}
.sc-body{font-family:var(--font-sans);font-size:14px;line-height:1.7;color:var(--body)}

/* ── MGMT ── */
.mgmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.mgmt{background:#0b1120;border:1px solid var(--border);border-radius:6px;padding:24px;}
.mgmt-role{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--elec);margin-bottom:8px;font-weight:600;}
.mgmt-name{font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:0.5px}
.mgmt-tag{font-family:var(--font-mono);font-weight:500;font-size:11px;color:var(--body);background:rgba(255,255,255,0.05);padding:4px 8px;border-radius:4px;display:inline-block;margin-bottom:14px;border:1px solid var(--border)}
.mgmt-bio{font-family:var(--font-sans);font-size:14px;line-height:1.7;color:var(--body)}

/* ── CANVAS FRAME (CHART WRAPPER) ── */
.chart-wrap{background:#0b1120;border:1px solid var(--border);border-radius:6px;padding:24px;margin-bottom:24px;position:relative; width:100%; display:block; overflow-x:auto; -webkit-overflow-scrolling:touch;}
.chart-wrap::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(0,243,255,0.5);box-shadow:var(--elec-glow);animation:scan 4s linear infinite;opacity:0.3;pointer-events:none}
@keyframes scan{0%{top:0}100%{top:100%}}
canvas.chart{display:block;}

.notice{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-left:3px solid var(--live);border-radius:6px;padding:24px;font-family:var(--font-sans);font-size:14.5px;color:var(--body);line-height:1.76;}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:24px; min-width:0;}
.g2 > div { min-width:0; }
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px; min-width:0;}
.g3 > div { min-width:0; }
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px; min-width:0;}
.g4 > div { min-width:0; }

.cover{background:rgba(15, 23, 42, 0.4);border:1px solid var(--border2);border-radius:8px;padding:48px;margin-bottom:36px;}

/* ── MOBILE OVERRIDES ── */
@media(max-width:1000px){
  .g4, .g3, .scenarios {grid-template-columns:1fr 1fr}
  .cover-kpis{grid-template-columns:repeat(3, 1fr);}
}
@media(max-width:768px){
  #topbar { padding: 0 16px; }
  .live-label { display: block; }
  .tb-bc { display: none; } 
  
  #content-scroll-area { padding: 24px 20px 40px; }
  .cover{padding:24px}
  .g2, .mgmt-grid, .g3, .scenarios {grid-template-columns:1fr}
  .kpi-row{grid-template-columns:1fr 1fr}
  .cover-kpis{grid-template-columns:1fr 1fr;}
  .pg-h1{font-size: 28px;}
  .nav-btn span { display: none; } 
  .toc-grid { grid-template-columns: 1fr; }
  
  .bar-row { flex-wrap: wrap; gap: 8px;}
  .bar-lbl { width: 100%; text-align: left; }
  .bar-val { width: auto; padding-left:0; }
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.bar-fill{transition:none!important}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="scroll-progress"></div>

<div id="toc-modal">
  <div class="toc-header">
    <div class="toc-title">Sections</div>
    <button id="close-toc">✕</button>
  </div>
  <div class="toc-grid" id="toc-grid-container">
    </div>
</div>

<div id="shell">
  <div id="topbar">
    <button id="menu-btn" aria-label="Open Sections">
      <svg width="18" height="14" viewBox="0 0 24 20" fill="none"><rect width="24" height="2" fill="currentColor"/><rect y="9" width="24" height="2" fill="currentColor"/><rect y="18" width="24" height="2" fill="currentColor"/></svg>
      SECTIONS
    </button>

const contentScrollArea = document.getElementById('content-scroll-area');

// ─────────────────────────────────────────
// POWER GRID CANVAS ANIMATION
// ─────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let w, h;
let gridLines = [];
let surges = [];
const gridSize = 80; 
let mouse = { x: -1000, y: -1000 };

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    initGrid();
}

function initGrid() {
    gridLines = [];
    for(let x = 0; x <= w; x += gridSize) { gridLines.push({type: 'v', pos: x}); }
    for(let y = 0; y <= h; y += gridSize) { gridLines.push({type: 'h', pos: y}); }
}

class Surge {
    constructor() { this.reset(); }
    reset() {
        this.type = Math.random() > 0.5 ? 'v' : 'h';
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.speed = Math.random() * 2 + 1.5;
        this.length = Math.random() * 40 + 20;
        this.alpha = Math.random() * 0.3 + 0.1;
        
        if (this.type === 'v') {
            this.x = Math.floor(Math.random() * (w / gridSize)) * gridSize;
            this.y = this.direction === 1 ? -this.length : h + this.length;
        } else {
            this.y = Math.floor(Math.random() * (h / gridSize)) * gridSize;
            this.x = this.direction === 1 ? -this.length : w + this.length;
        }
    }
    update() {
        if (this.type === 'v') {
            this.y += this.speed * this.direction;
            if ((this.direction === 1 && this.y > h + this.length) || 
                (this.direction === -1 && this.y < -this.length)) {
                this.reset();
            }
        } else {
            this.x += this.speed * this.direction;
            if ((this.direction === 1 && this.x > w + this.length) || 
                (this.direction === -1 && this.x < -this.length)) {
                this.reset();
            }
        }
    }
    draw() {
        ctx.beginPath();
        if (this.type === 'v') {
            let grad = ctx.createLinearGradient(0, this.y, 0, this.y - (this.length * this.direction));
            grad.addColorStop(0, `rgba(56, 189, 248, ${this.alpha})`);
            grad.addColorStop(1, 'rgba(56, 189, 248, 0)');
            ctx.strokeStyle = grad;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x, this.y - (this.length * this.direction));
        } else {
            let grad = ctx.createLinearGradient(this.x, 0, this.x - (this.length * this.direction), 0);
            grad.addColorStop(0, `rgba(56, 189, 248, ${this.alpha})`);
            grad.addColorStop(1, 'rgba(56, 189, 248, 0)');
            ctx.strokeStyle = grad;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - (this.length * this.direction), this.y);
        }
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }
}

window.addEventListener('resize', resize);

for(let i=0; i<25; i++) surges.push(new Surge());

window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function drawGrid() {
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(30, 41, 59, 0.5)'; 
    ctx.lineWidth = 1;
    gridLines.forEach(l => {
        if(l.type === 'v') { ctx.moveTo(l.pos, 0); ctx.lineTo(l.pos, h); }
        else { ctx.moveTo(0, l.pos); ctx.lineTo(w, l.pos); }
    });
    ctx.stroke();

    gridLines.forEach(l => {
        let dist = 0;
        if(l.type === 'v') dist = Math.abs(mouse.x - l.pos);
        else dist = Math.abs(mouse.y - l.pos);
        
        if (dist < 100) {
            ctx.beginPath();
            let intensity = 1 - (dist / 100);
            ctx.strokeStyle = `rgba(56, 189, 248, ${intensity * 0.15})`;
            ctx.lineWidth = 1;
            if(l.type === 'v') {
                let grad = ctx.createLinearGradient(0, mouse.y - 100, 0, mouse.y + 100);
                grad.addColorStop(0, 'rgba(56,189,248,0)');
                grad.addColorStop(0.5, `rgba(56,189,248,${intensity*0.3})`);
                grad.addColorStop(1, 'rgba(56,189,248,0)');
                ctx.strokeStyle = grad;
                ctx.moveTo(l.pos, mouse.y - 100); ctx.lineTo(l.pos, mouse.y + 100);
            } else {
                let grad = ctx.createLinearGradient(mouse.x - 100, 0, mouse.x + 100, 0);
                grad.addColorStop(0, 'rgba(56,189,248,0)');
                grad.addColorStop(0.5, `rgba(56,189,248,${intensity*0.3})`);
                grad.addColorStop(1, 'rgba(56,189,248,0)');
                ctx.strokeStyle = grad;
                ctx.moveTo(mouse.x - 100, l.pos); ctx.lineTo(mouse.x + 100, l.pos);
            }
            ctx.stroke();
        }
    });

    surges.forEach(s => { s.update(); s.draw(); });
    requestAnimationFrame(drawGrid);
}

// ─────────────────────────────────────────
// SPA ROUTING & NAVIGATION LOGIC
// ─────────────────────────────────────────
const activeSectionContainer = document.getElementById('active-section');
const tocModal = document.getElementById('toc-modal');
const tocGrid = document.getElementById('toc-grid-container');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const navIndicator = document.getElementById('nav-indicator');
const menuBtn = document.getElementById('menu-btn');
const closeTocBtn = document.getElementById('close-toc');

let currentIndex = 0;

// Build TOC Modal Grid
SECTIONS.forEach((s, index) => {
  const a = document.createElement('a');
  a.className = 'toc-item';
  a.href = '#' + s.id;
  a.id = 'toc-' + s.id;
  a.innerHTML = `<span class="toc-num">${s.num}</span><span class="toc-text">${s.title}</span>`;
  a.onclick = (e) => { 
    e.preventDefault(); 
    closeTOC();
    loadSection(index); 
  };
  tocGrid.appendChild(a);
});

// Modal Toggles
if(menuBtn) {
  menuBtn.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();
    tocModal.classList.add('show');
  });
}
if(closeTocBtn) {
  closeTocBtn.addEventListener('click', (e) => {
    e.preventDefault();
    closeTOC();
  });
}
function closeTOC() { tocModal.classList.remove('show'); }

// Bottom Navigation Buttons
function navNext() {
  if (currentIndex < SECTIONS.length - 1) loadSection(currentIndex + 1);
}
function navPrev() {
  if (currentIndex > 0) loadSection(currentIndex - 1);
}

// Core Load Function
function loadSection(index) {
  if (index < 0 || index >= SECTIONS.length) return;
  currentIndex = index;
  const s = SECTIONS[currentIndex];

  // Update TOC Active State
  document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
  const activeToc = document.getElementById('toc-' + s.id);
  if(activeToc) activeToc.classList.add('active');

  // Update Bottom Nav State
  navIndicator.innerHTML = `<span>${s.num}</span> / ${SECTIONS.length.toString().padStart(2, '0')}`;
  btnPrev.disabled = currentIndex === 0;
  btnNext.disabled = currentIndex === SECTIONS.length - 1;

  // Render HTML
  activeSectionContainer.innerHTML = s.render();

  // Reset scroll
  contentScrollArea.scrollTop = 0;

  // Render Charts safely after DOM updates
  requestAnimationFrame(() => {
    setTimeout(() => {
      animateBars(activeSectionContainer);
      drawCharts(s.id);
    }, 50);
  });
}

function animateBars(container) {
  container.querySelectorAll('.bar-fill[data-w]').forEach(f => {
    f.style.width = parseFloat(f.dataset.w) + '%';
  });
}

// Init Application
loadSection(0);

// ─────────────────────────────────────────
// CHARTS
// ─────────────────────────────────────────
const dpr = () => window.devicePixelRatio || 1;

function drawRevChart() {
  const cv = document.getElementById('revChart');
  if (!cv) return;
  
  let W = Math.max(cv.parentElement.offsetWidth - 48, 500); // Forces 500px minimum width so it scrolls on mobile
  let H = 180;
  
  if (W <= 0) {
    requestAnimationFrame(drawRevChart);
    return;
  }
  
  const d = dpr();
  cv.width = W * d; cv.height = H * d;
  const ctx = cv.getContext('2d'); ctx.scale(d, d);
  
  const lbls = ['FY22','FY23','FY24','FY25','H1FY26'];
  const rev = [147, 207, 285, 1072, 638];
  const pat = [3, 7, 26, 87, 58];
  const pad = {t:18, r:50, b:30, l:40};
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const n = lbls.length, mx = 1200;
  const bw = Math.min(cw / (n * 2.5), 26);
  ctx.clearRect(0, 0, W, H);
  
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * (1 - i/4);
    ctx.strokeStyle = 'rgba(56, 189, 248, 0.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
    ctx.fillStyle = '#475569'; ctx.font = '700 11px "Fira Code",monospace'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(mx * i/4), pad.l - 8, y + 4);
  }
  
  lbls.forEach((l, i) => {
    const gx = pad.l + i * (cw/n) + cw/(n*2);
    const rh = (rev[i]/mx) * ch;
    
    ctx.fillStyle = 'rgba(56, 189, 248, 0.2)'; 
    ctx.fillRect(gx - bw - 1, pad.t + ch - rh, bw, rh);
    ctx.fillStyle = '#38bdf8';
    ctx.fillRect(gx - bw - 1, pad.t + ch - rh, bw, 2); 
    
    const ph = (pat[i]/mx) * ch;
    ctx.fillStyle = 'rgba(16, 185, 129, 0.2)'; 
    ctx.fillRect(gx + 2, pad.t + ch - ph, bw, ph);
    ctx.fillStyle = '#10b981';
    ctx.fillRect(gx + 2, pad.t + ch - ph, bw, 2); 
    
    ctx.fillStyle = '#94a3b8'; ctx.font = '700 11px "Fira Code",monospace'; ctx.textAlign = 'center';
    ctx.fillText(l, gx, H - pad.b + 18);
  });
  
  ctx.fillStyle = '#38bdf8'; ctx.fillRect(W - 40, pad.t, 12, 12);
  ctx.fillStyle = '#f8fafc'; ctx.font = '600 12px "Exo 2",sans-serif'; ctx.textAlign = 'right'; ctx.fillText('Rev', W - 48, pad.t + 10);
  ctx.fillStyle = '#10b981'; ctx.fillRect(W - 40, pad.t + 24, 12, 12);
  ctx.fillStyle = '#f8fafc'; ctx.fillText('PAT', W - 48, pad.t + 34);
}

const PD = [
  {d:'02 Apr',c:909},{d:'16 Apr',c:956},{d:'09 May',c:1203},{d:'30 May',c:1320},
  {d:'20 Jun',c:1391},{d:'11 Jul',c:1344},{d:'01 Aug',c:1521},{d:'25 Aug',c:1588},
  {d:'16 Sep',c:1398},{d:'08 Oct',c:1507},{d:'30 Oct',c:1499},{d:'21 Nov',c:1203},
  {d:'12 Dec',c:1076},{d:'05 Jan',c:1057},{d:'28 Jan',c:788},{d:'17 Feb',c:985},
  {d:'11 Mar',c:863},{d:'25 Mar',c:826},{d:'01 Apr',c:823}
];

function drawPriceChart() {
  const cv = document.getElementById('priceChart');
  if (!cv) return;
  
  let W = cv.parentElement.offsetWidth - 48; // padding
  let H = 220;
  
  if (W <= 0) {
    requestAnimationFrame(drawPriceChart);
    return;
  }
  
  const d = dpr();
  cv.width = W * d; cv.height = H * d;
  const ctx = cv.getContext('2d'); ctx.scale(d, d);
  const pad = {t:20,r:20,b:36,l:40}, cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const vals = PD.map(x => x.c), mn = Math.min(...vals) * .95, mx = Math.max(...vals) * 1.05;
  ctx.clearRect(0, 0, W, H);
  
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch * (1 - i/4);
    ctx.strokeStyle = 'rgba(56, 189, 248, 0.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cw, y); ctx.stroke();
    ctx.fillStyle = '#475569'; ctx.font = '700 11px "Fira Code",monospace'; ctx.textAlign = 'right';
    ctx.fillText('₹' + Math.round(mn + (mx-mn)*(i/4)), pad.l - 8, y + 4);
  }
  
  ctx.beginPath();
  PD.forEach((p, i) => { const x = pad.l + (i/(PD.length-1))*cw, y = pad.t+ch*(1-(p.c-mn)/(mx-mn)); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.lineTo(pad.l+cw, pad.t+ch); ctx.lineTo(pad.l, pad.t+ch); ctx.closePath();
  const g = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
  g.addColorStop(0,'rgba(56, 189, 248, 0.2)'); g.addColorStop(1,'rgba(56, 189, 248, 0)');
  ctx.fillStyle = g; ctx.fill();
  
  ctx.beginPath(); ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  PD.forEach((p, i) => { const x = pad.l+(i/(PD.length-1))*cw, y = pad.t+ch*(1-(p.c-mn)/(mx-mn)); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();
  
  const step = W < 500 ? Math.ceil(PD.length/4) : Math.ceil(PD.length/7);
  ctx.fillStyle = '#94a3b8'; ctx.font = '700 11px "Fira Code",monospace'; ctx.textAlign = 'center';
  PD.forEach((p, i) => { if(i%step===0) ctx.fillText(p.d, pad.l+(i/(PD.length-1))*cw, H-pad.b+20); });
}

function drawCharts(id) {
  if (id === 'financials') drawRevChart();
  if (id === 'price') drawPriceChart();
}

window.addEventListener('resize', () => {
  const activeSection = document.getElementById('active-section').innerHTML;
  if(activeSection.includes('revChart')) drawRevChart();
  if(activeSection.includes('priceChart')) drawPriceChart();
});
</script>
