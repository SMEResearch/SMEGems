            + '@media print { html,body{display:none!important;visibility:hidden!important;} *{display:none!important;} }'
            + '</style>';

        html = html.replace('</head>', protectionCSS + '</head>');
        html = html.replace('</body>', protectionScript + '</body>');

        var frame = document.getElementById('secure-frame');
        frame.srcdoc = html;

        frame.onload = function(){
            setTimeout(function(){
                var ls = document.getElementById('loading-screen');
                if(ls){
                    ls.classList.add('fade-out');
                    setTimeout(function(){ ls.remove(); }, 700);
                }
            }, 300);
        };

        html = null;
        _payload = null;
        _chunks.length = 0;
        keyBytes = null;
        ivBytes = null;
    })

        document.body.innerHTML = '<div style="background:#060d12;color:#e8605c;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;"><div><h1>DECRYPTION FAILED</h1><p style="color:#8ca0b0;margin-top:1rem;">Content integrity check failed. This file may have been tampered with.</p></div></div>';
