<html lang="en">
<head>
<meta charset="UTF-8">

<title>Kalyani Cast-Tech — Investor Research 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d12;--panel:#091318;--card:rgba(12,24,32,0.7);--card2:#0e1e28;--border:#1a3040;--border2:#264050;--teal:#2dd4a8;--teal-dim:rgba(45,212,168,0.1);--gold:#f0c050;--coral:#e8605c;--sky:#58b4e8;--text:#eef4f8;--body:#8ca0b0;--muted:#5c7888;--dim:#3c5868;--font-sans:'Outfit',sans-serif;--font-mono:'IBM Plex Mono',monospace;--font-head:'Space Grotesk',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100dvh;width:100vw;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
#scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--gold),var(--sky));z-index:10000;width:0%;transition:width 0.1s ease-out}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.18}
#shell{display:flex;height:100dvh;position:relative;z-index:1;width:100%}

/* NEW SIDEBAR STYLES */
#sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100dvh; background: rgba(9, 19, 24, 0.98); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10000; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 24px 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
#sidebar.open { left: 0; }
#sidebar-logo { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--teal); letter-spacing: 2px; margin-bottom: 24px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
#close-sidebar { background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
#close-sidebar:hover { color: var(--coral); }
#sidebar-list { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; padding: 0 16px; }
#sidebar-list::-webkit-scrollbar { width: 4px; }
#sidebar-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.side-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 6px; cursor: pointer; color: var(--body); font-family: var(--font-sans); font-size: 14px; font-weight: 500; transition: all 0.2s; border: 1px solid transparent; }
.side-item:hover { background: rgba(255,255,255,0.03); color: var(--text); transform: translateX(4px); }
.side-item.active { background: rgba(45,212,168,0.08); color: var(--teal); border-color: rgba(45,212,168,0.2); }
.side-num { font-family: var(--font-mono); font-size: 11px; font-weight: 700; opacity: 0.6; }
.side-item.active .side-num { opacity: 1; }

#sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
#sidebar-overlay.show { opacity: 1; pointer-events: auto; }

/* TOPBAR UPDATES */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden; position: relative; z-index: 10; width: 100%;}
#topbar{background:rgba(6,13,18,.95);border-bottom:1px solid var(--border);padding:0 28px;height:48px;display:flex;align-items:center;gap:14px;z-index:90;flex-shrink:0; backdrop-filter: blur(10px);}
#menu-btn { background: transparent; border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
#menu-btn:hover { border-color: var(--teal); color: var(--teal); background: rgba(45,212,168,0.05); }

.tb-bc{font-family:var(--font-mono);font-weight:600;font-size:11px;color:var(--body);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.12em;text-transform:uppercase}
.tb-bc span{color:var(--teal)}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0;background:rgba(45,212,168,0.08);padding:4px 12px;border-radius:4px;border:1px solid rgba(45,212,168,0.2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.85)}}
.live-label{font-family:var(--font-mono);font-size:10px;color:var(--teal);font-weight:700;letter-spacing:1px}
.pg-counter{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px}.pg-counter span{color:var(--teal);font-weight:700}

#content-scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;padding:32px 44px;position:relative;z-index:2;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;-webkit-overflow-scrolling:touch}
#content-scroll-area::-webkit-scrollbar{width:5px}
#content-scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}

#active-section{max-width:1060px;margin:0 auto;width:100%; padding-bottom: 100px;}
.section-wrapper { margin-bottom: 100px; padding-top: 10px; min-height: 80vh; }

.pg-eye{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:12px}.pg-eye::after{content:'';height:1px;width:50px;background:var(--teal)}
.pg-h1{font-family:var(--font-head);font-size:clamp(30px,4.5vw,48px);font-weight:800;line-height:1.08;color:var(--text);margin-bottom:12px;letter-spacing:-0.5px}.pg-h1 em{color:var(--teal);font-style:normal}
.pg-sub{font-family:var(--font-sans);font-size:15px;color:var(--body);margin-bottom:24px;line-height:1.72;font-weight:400}
.sec-h{font-family:var(--font-head);font-size:20px;font-weight:700;letter-spacing:0.5px;color:var(--text);margin:0 0 20px;display:flex;align-items:center;gap:12px}.sec-h::after{content:'';height:1px;flex:1;background:var(--border2);opacity:0.5}

.cover-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:0}
.cover-kpis .kpi{padding:13px 11px;background:rgba(14,30,40,0.5);border:1px solid var(--border);border-radius:5px}
.cover-kpis .kpi-lbl{font-size:8.5px;letter-spacing:0.5px;margin-bottom:6px;color:var(--muted)}
.cover-kpis .kpi-val{font-size:16px;white-space:nowrap;font-weight:700;color:var(--text)}
.cover-kpis .kpi-note{font-size:9px;margin-top:6px;color:var(--body)}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:20px;position:relative;overflow:hidden;transition:all .2s ease}
.kpi:hover{border-color:var(--border2);transform:translateY(-2px)}
.kpi::after{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--dim);transition:all 0.3s}
.kpi:hover::after{background:var(--teal)}
.kpi.t::after{background:var(--teal)}.kpi.g::after{background:var(--gold)}.kpi.k::after{background:var(--sky)}.kpi.r::after{background:var(--coral)}
.kpi-lbl{font-family:var(--font-mono);font-weight:600;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--body);margin-bottom:9px}
.kpi-val{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-0.5px}
.kpi-val.t{color:var(--teal)}.kpi-val.g{color:var(--gold)}.kpi-val.k{color:var(--sky)}.kpi-val.r{color:var(--coral)}
.kpi-note{font-family:var(--font-sans);font-weight:500;font-size:11px;color:var(--body);margin-top:9px}

.ccard{background:rgba(14,30,40,0.4);border:1px solid var(--border);border-radius:5px;padding:24px;margin-bottom:12px;transition:all .2s ease}
.ccard:hover{border-color:var(--border2);background:rgba(14,30,40,0.6)}
.ccard-h{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.ccard p,.ccard-body{font-family:var(--font-sans);font-size:14px;line-height:1.75;color:var(--body)}

.hl{border:1px solid var(--border);border-left:4px solid var(--teal);background:rgba(14,30,40,0.4);padding:14px 18px;border-radius:0 5px 5px 0;font-family:var(--font-sans);font-size:14px;color:var(--text);line-height:1.75;margin-bottom:12px}
.hl.warn{border-left-color:var(--coral);background:rgba(232,96,92,0.04)}
.hl.ok{border-left-color:var(--teal);background:rgba(45,212,168,0.04)}
.hl.gold{border-left-color:var(--gold);background:rgba(240,192,80,0.04)}
.hl.sky{border-left-color:var(--sky);background:rgba(88,180,232,0.04)}
.hl.sub{border-left-color:var(--dim);background:rgba(255,255,255,0.02)}

.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;border-radius:4px;border:1px solid var(--border);margin-bottom:20px;background:#040a0f}
table{width:100%;border-collapse:collapse}
thead tr{background:#0e1e28;border-bottom:1px solid var(--border2)}
th{font-family:var(--font-mono);font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--body);padding:12px 16px;text-align:right;white-space:nowrap}
th:first-child{text-align:left}
td{padding:11px 16px;text-align:right;border-bottom:1px solid var(--border);color:var(--body);font-family:var(--font-mono);font-size:12px}
td:first-child{text-align:left;color:var(--text);font-family:var(--font-sans);font-size:13.5px;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.tg{color:var(--teal)!important}.tgo{color:var(--gold)!important}.ts{color:var(--sky)!important}.tr-c{color:var(--coral)!important}

.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.tag{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:3px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;border:1px solid var(--border);background:var(--card2);color:var(--body)}
.tag.t{color:var(--teal);border-color:rgba(45,212,168,0.3)}.tag.g{color:var(--gold);border-color:rgba(240,192,80,0.3)}.tag.k{color:var(--sky);border-color:rgba(88,180,232,0.3)}

.volt-meter{background:#081218;border:1px solid var(--border);border-radius:7px;padding:22px 18px;text-align:center;transition:all 0.2s ease}
.volt-meter:hover{transform:translateY(-2px);border-color:var(--border2)}
.vm-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:600}
.vm-val{font-family:var(--font-mono);font-size:30px;font-weight:700;line-height:1;color:var(--text)}
.volt-meter.t .vm-val{color:var(--teal)}.volt-meter.g .vm-val{color:var(--gold)}.volt-meter.k .vm-val{color:var(--sky)}
.vm-sub{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--body);margin-top:10px}

.mgmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.mgmt{background:#081218;border:1px solid var(--border);border-radius:5px;padding:20px}
.mgmt-role{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;font-weight:600}
.mgmt-name{font-family:var(--font-head);font-size:19px;font-weight:700;color:var(--text);margin-bottom:7px}
.mgmt-tag{font-family:var(--font-mono);font-weight:500;font-size:10px;color:var(--body);background:rgba(255,255,255,0.04);padding:3px 6px;border-radius:3px;display:inline-block;margin-bottom:10px;border:1px solid var(--border)}
.mgmt-bio{font-family:var(--font-sans);font-size:14px;line-height:1.7;color:var(--body)}

.chart-wrap{background:#081218;border:1px solid var(--border);border-radius:5px;padding:20px;margin-bottom:20px;position:relative;width:100%;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
canvas.chart{display:block}

.notice{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-left:3px solid var(--coral);border-radius:5px;padding:20px;font-family:var(--font-sans);font-size:13.5px;color:var(--body);line-height:1.76}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-width:0}.g2>div{min-width:0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;min-width:0}

.cover{background:rgba(14,30,40,0.4);border:1px solid var(--border2);border-radius:7px;padding:40px;margin-bottom:28px}
.video-embed{width:100%;aspect-ratio:16/9;border-radius:5px;border:1px solid var(--border2);background:#000}

@media(max-width:1000px){.g3{grid-template-columns:1fr 1fr}.cover-kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){#topbar{padding:0 14px}.tb-bc{display:none}#content-scroll-area{padding:18px 16px 32px}.cover{padding:20px}.g2,.mgmt-grid,.g3{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.cover-kpis{grid-template-columns:1fr 1fr}.pg-h1{font-size:26px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
// Scroll Progress Logic
const C = document.getElementById('content-scroll-area');
C.addEventListener('scroll', () => {
  const s = C.scrollTop, h = C.scrollHeight - C.clientHeight;
  document.getElementById("scroll-progress").style.width = (h > 0 ? (s / h) * 100 : 0) + "%";
});

// Canvas Background Animation
const cv = document.getElementById('bg-canvas'), cx = cv.getContext('2d');
let w, h; const ps = [];
function rsz() { w = cv.width = innerWidth; h = cv.height = innerHeight; }
addEventListener('resize', rsz); rsz();
class P {
  constructor() { this.r() }
  r() { this.x = Math.random() * w; this.y = Math.random() * h; this.s = Math.random() * 2.5 + 1; this.sx = (Math.random() - .5) * .25; this.sy = Math.random() * .12 + .04; this.a = Math.random() * .25 + .05 }
  u() { this.x += this.sx; this.y += this.sy; if (this.y > h + 10) { this.y = -10; this.x = Math.random() * w } if (this.x < -10 || this.x > w + 10) this.sx *= -1 }
  d(c) { c.beginPath(); c.arc(this.x, this.y, this.s, 0, Math.PI * 2); c.fillStyle = `rgba(45,212,168,${this.a})`; c.fill() }
}
for (let i = 0; i < 35; i++) ps.push(new P());
function anim() {
  cx.clearRect(0, 0, w, h);
  ps.forEach(p => { p.u(); p.d(cx) });
  for (let i = 0; i < ps.length; i++)
    for (let j = i + 1; j < ps.length; j++) {
      const dx = ps[i].x - ps[j].x, dy = ps[i].y - ps[j].y, d = Math.sqrt(dx * dx + dy * dy);
      if (d < 110) { cx.beginPath(); cx.strokeStyle = `rgba(45,212,168,${.05 * (1 - d / 110)})`; cx.lineWidth = .5; cx.moveTo(ps[i].x, ps[i].y); cx.lineTo(ps[j].x, ps[j].y); cx.stroke() }
    }
  requestAnimationFrame(anim)
}
anim();

// THE DATA 
const S = [
{id:'cover', num:'01', title:'Executive Summary', render:()=>`
  <div class="cover">
    <div class="pg-eye">SME Gems — Hidden Champions of the SME Platform</div>
    <div class="pg-h1">Kalyani Cast-Tech<br><em>Forging India's Container Revolution</em></div>
    <div class="pg-sub" style="max-width:850px">Founded 2012 · India's largest domestic container manufacturer · Architect of double-stack dwarf containers · Only approved Indian foundry for container corner castings (Lloyd's Register UK) · Listed BSE SME Nov 2023 · Expanding into wagon manufacturing, refrigeration containers & Gati Shakti cargo terminal</div>
    <div class="cover-kpis">
      <div class="kpi t"><div class="kpi-lbl">Market Cap</div><div class="kpi-val t">₹503Cr</div><div class="kpi-note">CMP ~₹700</div></div>
      <div class="kpi g"><div class="kpi-lbl">TTM Revenue</div><div class="kpi-val g">₹161Cr</div><div class="kpi-note">+40% YoY</div></div>
      <div class="kpi g"><div class="kpi-lbl">TTM PAT</div><div class="kpi-val g">₹16Cr</div><div class="kpi-note">197% 5Y CAGR</div></div>
      <div class="kpi k"><div class="kpi-lbl">ROCE / ROE</div><div class="kpi-val k">30% / 24%</div><div class="kpi-note">FY25</div></div>
      <div class="kpi t"><div class="kpi-lbl">P/E (TTM)</div><div class="kpi-val t">~31.4x</div><div class="kpi-note">Growth co.</div></div>
      <div class="kpi g"><div class="kpi-lbl">Order Book</div><div class="kpi-val g">₹140Cr</div><div class="kpi-note">H1 FY26</div></div>
    </div>
  </div>
  <div class="sec-h">Company Snapshot</div>
  <p style="font-family:var(--font-sans);font-size:15px;color:var(--body);line-height:1.78;max-width:880px;margin-bottom:20px">
    Kalyani Cast-Tech Limited (KCTL) was incorporated in 2012 by Naresh Kumar, an IIT Madras M.Tech graduate and former Indian Railway Service of Mechanical Engineers (IRSME) officer with 17+ years of Class-A service. The company started as a steel foundry in Rewari, Haryana, manufacturing casting components for Indian Railways. In 2021, recognizing the massive gap in India's container ecosystem, KCTL diversified into container manufacturing — at a time when others were exiting the space. Today it is India's largest domestic container manufacturer with ~6,000 TEU installed capacity, expanding to 16,000 TEUs.
  </p>
  <div class="sec-h">Key Customers</div>
  <div class="tags">
    <span class="tag t">CONCOR</span><span class="tag t">Indian Railways</span><span class="tag t">DP World</span><span class="tag k">Western Carriers</span><span class="tag k">Pristine Group</span><span class="tag g">Jindal Stainless</span><span class="tag">Glasswing</span><span class="tag">Coach Builders Pvt Ltd</span>
  </div>
  <div class="sec-h" style="margin-top:28px">Awards & Certifications</div>
  <div class="hl ok"><strong>Awards:</strong> ET Economic Times "MSME of the Year 2024" in Manufacturing (awarded Mar 20, 2025) · CNBC TV18 / HSBC "SME Champion Award" for Industrial Excellence & Make in India</div>
  <div class="hl"><strong>Approvals:</strong> ISO 9001:2008 certified · Class A foundry as per IS 12117:1996 · Only approved Indian foundry authorized to manufacture container corner castings — approved by Lloyd's Register UK · 5+ patents held by founder Naresh Kumar</div>
`},
{id:'history', num:'02', title:'Company History & Products', render:()=>`
  <div class="sec-h">The Journey — From Foundry to Logistics Platform</div>
  <div class="ccard" style="border-top:3px solid var(--teal)">
    <div class="ccard-h">Key Milestones</div>
    <div class="ccard-body">
      <strong style="color:var(--text)">2008:</strong> Naresh Kumar resigns from Indian Railways after 17 years as IRSME Class-A officer. Gains deep domain expertise running CONCOR and Pipavav Railway Corp infrastructure.<br><br>
      <strong style="color:var(--text)">Sep 2012:</strong> Kalyani Cast-Tech incorporated in Delhi. Vision: integrated manufacturing for steel/iron castings.<br><br>
      <strong style="color:var(--text)">2014:</strong> Steel foundry commissioned at Mamaria Thether, Rewari, Haryana (3.5 acres, 6,000 sqm). Established as a Class A foundry producing critical components like MG Couplers, CI Brake Blocks, WDG4 Adapters, Bearing Housings, Corner Castings, and Hub Traction Motors.<br><br>
      <strong style="color:var(--text)">2018-19:</strong> Recognizing the domestic container manufacturing gap, the company begins intensive R&D, designing proprietary double-stack containers at a time when peers were actively exiting the sector.<br><br>
      <strong style="color:var(--text)">Dec 2021:</strong> First dedicated container manufacturing plant inaugurated at Rewari.<br><br>
      <strong style="color:var(--text)">Jun 2022:</strong> Converted to Public Limited Company.<br><br>

{id:'tailwinds', num:'08', title:'Container & DFC Tailwinds', render:()=>`

      <div class="ccard-body">
        Historically, a standard ISO container cost ~₹1.6 lakhs in China versus ~₹2.4 lakhs in India (an ₹80,000 or ~$900 gap). The new Container Manufacturing Assistance Scheme (CMAS) provides Viability Gap Funding (VGF) of $400–$800 per container. This effectively bridges the cost differential, allowing domestic manufacturers to achieve pricing parity with Chinese imports for the first time. The ₹2,000 Cr annual incentive pool provides massive headroom for existing players to scale.
      </div>

      <div class="ccard-body">
        China produces ~50 lakh containers annually out of necessity to support $4 Trillion in exports. As India's exports ($400 Bn) scale alongside the launch of the Bharat Container Shipping Line (which alone requires ~10L TEUs), captive demand for domestic ISO containers will surge. This directly substitutes India's current reliance on 20 lakh imported empty containers per year.
      </div>
    </div>
  </div>
  
  <div class="sec-h">Dedicated Freight Corridor Impact</div>

      <div class="ccard-body">

        <strong style="color:var(--text)">KCTL advantage:</strong> Dwarf containers are India-specific — enable double-stack on electrified routes where OHE limits standard height

    </div>
  </div>
`},

const PD = [{ d: "Apr'25", c: 396 }, { d: '17A', c: 412 }, { d: "May", c: 399 }, { d: "Jun", c: 414 }, { d: "Jul", c: 530 }, { d: "Aug", c: 560 }, { d: "Sep", c: 522, ev: 'b', desc: 'Gulati Entry' }, { d: "Oct", c: 599, ev: 'p', desc: '52W High ₹625' }, { d: "Nov", c: 490 }, { d: "Dec", c: 460 }, { d: "Jan'26", c: 441 }, { d: '1Feb', c: 480, ev: 'g', desc: 'Budget ₹10KCr' }, { d: '11F', c: 510, ev: 'm', desc: 'IceBattery MoU' }, { d: "Mar", c: 500 }, { d: '20M', c: 522 }, { d: '2Apr', c: 538 }, { d: '21A', c: 700, ev: 'p', desc: 'NA Layout Approved' }];
function dPC() {

    const st = W < 500 ? Math.ceil(PD.length / 4) : Math.ceil(PD.length / 6);
    c.fillStyle = '#8ca0b0'; c.font = '700 9px "IBM Plex Mono",monospace'; c.textAlign = 'center'; pts.forEach((p, i) => { if (i % st === 0) c.fillText(p.d.d, p.x, H - pd.b + 16) });
    pts.forEach(p => {

    });

    }
