    <style>
        /* --- ESDM / PCB / CYBER-TECH THEME --- */
        :root {
            --bg-dark: #07090f;          
            --bg-panel: rgba(13, 18, 30, 0.85); 
            --accent-primary: #00e5ff;   
            --accent-primary-dim: rgba(0, 229, 255, 0.15);
            --accent-secondary: #ffb300; 
            --accent-secondary-dim: rgba(255, 179, 0, 0.15);
            --text-main: #f8fafc;
            --text-muted: #8b9bb4;
            --danger: #ff3366;           
            --success: #00e676;          
            --border-color: rgba(0, 229, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            width: 100%; height: 100%;
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .heading-font { 
            font-family: 'Rajdhani', sans-serif; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #bg-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; pointer-events: none; 
        }

        #app-container { 
            display: flex; width: 100%; height: 100%; 
            overflow: hidden; position: relative; z-index: 1; 
        }

        /* --- SIDEBAR: EXPAND-ON-HOVER --- */
        .sidebar {
            width: 70px; 
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column; 
            border-right: 1px solid var(--border-color);
            z-index: 100; overflow-y: auto; overflow-x: hidden;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 5px 0 30px rgba(0, 229, 255, 0.05);
        }
        .sidebar:hover, .sidebar.force-open {
            width: 280px; 
        }
        .sidebar::-webkit-scrollbar { width: 0px; } 

        .brand-logo {
            padding: 1.5rem; border-bottom: 1px solid var(--border-color); margin-bottom: 1rem; 
            display: flex; align-items: center; white-space: nowrap;
        }
        .brand-logo i { font-size: 1.8rem; color: var(--accent-primary); min-width: 40px; text-align: center; }
        .brand-text { margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
        .sidebar:hover .brand-text, .sidebar.force-open .brand-text { opacity: 1; }
        .brand-text h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 0;}
        .brand-text span { color: var(--accent-secondary); font-size: 0.75rem; letter-spacing: 2px; font-family: 'Inter', sans-serif;}

        .nav-item {
            padding: 0.9rem 1.5rem; color: var(--text-muted); cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; font-weight: 600; font-size: 0.95rem;
            border-left: 3px solid transparent; white-space: nowrap;
            position: relative;
        }
        .nav-item i { font-size: 1.2rem; min-width: 40px; text-align: center; transition: all 0.3s; }
        .nav-text { margin-left: 10px; opacity: 0; transition: opacity 0.3s; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;}
        .sidebar:hover .nav-text, .sidebar.force-open .nav-text { opacity: 1; }
        
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent-primary-dim), transparent); transition: width 0.3s ease; z-index: -1; }
        .nav-item:hover::before { width: 100%; }
        .nav-item:hover { color: var(--text-main); }
        .nav-item:hover i { color: var(--accent-primary); transform: scale(1.1); }
        .nav-item.active { color: var(--accent-primary); background: var(--accent-primary-dim); border-left-color: var(--accent-primary); }
        .nav-item.active i { color: var(--accent-primary); text-shadow: 0 0 10px var(--accent-primary); }

        /* Mobile Header */
        .mobile-header {
            display: none; background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(12px); 
            padding: 1rem 1.5rem; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: fixed; top: 0; width: 100%; z-index: 99;
        }
        .menu-toggle { background: transparent; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; }
        .mobile-brand { font-size: 1.4rem; font-weight: 800; color: var(--text-main); font-family: 'Rajdhani', sans-serif; }
        .mobile-brand span { color: var(--accent-primary); }

        /* Main Area */
        .main-container {
            flex: 1; padding: 2rem 4rem; overflow-y: auto; scroll-behavior: smooth; height: 100%; -webkit-overflow-scrolling: touch; 
            background: radial-gradient(circle at top right, rgba(0, 229, 255, 0.05), transparent 60%);
        }

        .slide { display: none; max-width: 1200px; margin: 0 auto; padding-bottom: 5rem; position: relative; z-index: 2;}
        .slide.active { display: block; }

        .stagger { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .s1 { animation-delay: 0.1s; } .s2 { animation-delay: 0.2s; } .s3 { animation-delay: 0.3s; } .s4 { animation-delay: 0.4s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .badge {
            display: inline-block; background: var(--accent-primary-dim); color: var(--accent-primary);
            padding: 0.4rem 1rem; border-radius: 2px; font-size: 0.8rem; font-weight: 700;
            letter-spacing: 1.5px; margin-bottom: 1.2rem; text-transform: uppercase; border: 1px solid rgba(0, 229, 255, 0.3);
            font-family: 'Rajdhani', sans-serif;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        
        .badge.warning { background: rgba(255, 179, 0, 0.15); color: var(--accent-secondary); border-color: rgba(255, 179, 0, 0.3); }

        .title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; margin-bottom: 0.8rem; line-height: 1.1; color: var(--text-main); }
        .subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; font-weight: 400; line-height: 1.5; border-left: 3px solid var(--accent-secondary); padding-left: 1rem;}
        .subtitle span { color: var(--accent-primary); font-weight: 600; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; }

        /* Circuit-style Cards */
        .card {
            background: var(--bg-panel); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); border-radius: 4px; padding: 1.5rem; position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: all 0.3s ease;
            display: flex; flex-direction: column;
        }
        
        .card::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px;
            border-top: 2px solid var(--accent-primary); border-left: 2px solid var(--accent-primary);
            transition: all 0.3s;
        }
        .card::after {
            content: ''; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px;
            border-bottom: 2px solid var(--accent-primary); border-right: 2px solid var(--accent-primary);
            transition: all 0.3s;
        }
        
        .card:hover { border-color: rgba(0, 229, 255, 0.4); transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0, 229, 255, 0.1); }
        .card:hover::before, .card:hover::after { width: 30px; height: 30px; }

        .card.secondary-border::before, .card.secondary-border::after { border-color: var(--accent-secondary); }
        .card.danger-border::before, .card.danger-border::after { border-color: var(--danger); }

        .metric-value { font-size: clamp(1.8rem, 3vw, 2.5rem); font-weight: 800; color: var(--text-main); margin: 0.5rem 0; font-family: 'Rajdhani', sans-serif;}
        .metric-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .highlight-primary { color: var(--accent-primary); font-weight: 600; }
        .highlight-secondary { color: var(--accent-secondary); font-weight: 600; }

        ul.custom-list { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; padding: 0; margin: 0; }
        ul.custom-list li { position: relative; padding-left: 1.5rem; line-height: 1.6; color: #b0c4de; font-size: 0.95rem; }
        ul.custom-list li::before { content: '>'; font-family: 'Rajdhani', sans-serif; font-weight: bold; position: absolute; left: 0; color: var(--accent-primary); font-size: 1rem; top: 0px; }

        ul.risk-list li::before { content: '!'; color: var(--danger); font-weight: bold;}
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-custom { width: 100%; border-collapse: collapse; margin-top: 1rem; min-width: 400px; }
        .table-custom th, .table-custom td { padding: 0.8rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: #e2e8f0; }
        .table-custom th { color: var(--accent-primary); text-transform: uppercase; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; background: rgba(0, 229, 255, 0.05);}
        .table-custom tr:hover td { background: rgba(0, 229, 255, 0.08); }

        .chart-box { background: var(--bg-panel); backdrop-filter: blur(16px); padding: 1.2rem; border-radius: 4px; height: 380px; border: 1px solid var(--border-color); }

        /* Valuation Callout */
        .valuation-callout {
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: linear-gradient(145deg, rgba(0, 229, 255, 0.05), rgba(0,0,0,0.6));
            border-radius: 4px; padding: 1.8rem; margin-top: 1.5rem; position: relative; overflow: hidden; 
            box-shadow: inset 0 0 30px rgba(0, 229, 255, 0.05);
        }
        .valuation-callout::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent-primary);
        }
        .valuation-callout p { font-size: 1.05rem; color: var(--text-main); line-height: 1.7; margin: 0; }

        .footer-branding { text-align: center; margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border-color); font-family: 'Rajdhani', sans-serif;}
        .footer-branding a { color: var(--accent-primary); text-decoration: none; font-weight: 600; transition: color 0.3s; display: inline-flex; align-items: center; gap: 8px;}
        .footer-branding a:hover { color: var(--text-main); }

        @media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .main-container { padding: 2rem; } }
        @media (max-width: 992px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: -300px; width: 280px; top: 0; height: 100%; box-shadow: 5px 0 30px rgba(0,0,0,0.9); }
            .sidebar.force-open { left: 0; }
            .nav-text { opacity: 1; }
            .brand-text { opacity: 1; }
            .main-container { padding: 1.2rem; padding-top: 6rem; padding-bottom: 6rem; }
            .chart-box { height: 300px; padding: 1rem; }
            .card { padding: 1.2rem; }
        }
    </style>
