<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriana Power - SME Gems</title>
</head>
<body>
    <div style="
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #020617; display: flex; align-items: center;
        justify-content: center; flex-direction: column;
        color: #f8fafc; font-family: sans-serif; z-index: 9999;
    " id="loading-screen">
        <div style="
            width: 40px; height: 40px; border: 3px solid #333;
            border-top-color: #10b981; border-radius: 50%;
            animation: spin 1s linear infinite;
        "></div>
        <p style="margin-top: 20px; opacity: 0.8;">Loading Oriana Power Analysis...</p>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        async function loadOrianaContent() {
            try {
                console.log('🔄 Fetching Oriana content...');
                
                const response = await fetch('https://ybbgmrftdyhigxyytgmn.supabase.co/rest/v1/content_chunks?slug=eq.Oriana&order=chunk_index.asc', {
                    headers: {
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliYmdtcmZ0ZHloaWd4eXl0Z21uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTU1MTUsImV4cCI6MjA5MjczMTUxNX0.dyNu4LDeFda_2VDoR_GFKV6CgBoNS83s3ldl_dBuYEE',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliYmdtcmZ0ZHloaWd4eXl0Z21uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTU1MTUsImV4cCI6MjA5MjczMTUxNX0.dyNu4LDeFda_2VDoR_GFKV6CgBoNS83s3ldl_dBuYEE'
                    }
                });

                const chunks = await response.json();
                console.log(`📦 Retrieved ${chunks.length} chunks`);

                // Decode content
                chunks.sort((a, b) => a.chunk_index - b.chunk_index);
                const fullBase64 = chunks.map(c => c.encoded_data).join('');
                const encodedData = Uint8Array.from(atob(fullBase64), c => c.charCodeAt(0));

                const key = "SMEGems2024!@#$";
                const keyBytes = new TextEncoder().encode(key);
                const decoded = new Uint8Array(encodedData.length);

                for (let i = 0; i < encodedData.length; i++) {
                    decoded[i] = encodedData[i] ^ keyBytes[i % keyBytes.length];
                }

                const htmlContent = new TextDecoder().decode(decoded);
                console.log('✅ Content decoded successfully');

                // Parse the HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');

                // IMPORTANT: Wait for external resources to load before showing content
                const loadingScreen = document.getElementById('loading-screen');
                
                // Pre-load all external stylesheets and fonts
                const externalLinks = doc.querySelectorAll('link[rel="stylesheet"], link[href*="fonts.googleapis.com"]');
                const linkPromises = Array.from(externalLinks).map(link => {
                    return new Promise((resolve, reject) => {
                        const newLink = document.createElement('link');
                        newLink.rel = link.rel;
                        newLink.href = link.href;
                        newLink.onload = resolve;
                        newLink.onerror = resolve; // Don't fail on missing fonts
                        document.head.appendChild(newLink);
                        // Timeout after 5 seconds
                        setTimeout(resolve, 5000);
                    });
                });

                // Pre-load external scripts
                const externalScripts = doc.querySelectorAll('script[src]');
                const scriptPromises = Array.from(externalScripts).map(script => {
                    return new Promise((resolve, reject) => {
                        const newScript = document.createElement('script');
                        newScript.src = script.src;
                        newScript.onload = resolve;
                        newScript.onerror = resolve; // Don't fail on missing scripts
                        document.head.appendChild(newScript);
                        setTimeout(resolve, 5000);
                    });
                });

                console.log('⏳ Loading external resources...');
                
                // Wait for all external resources
                await Promise.all([...linkPromises, ...scriptPromises]);
                
                console.log('📚 External resources loaded');

                // Now replace the content
                document.head.innerHTML = doc.head.innerHTML;
                
                // Add a small delay to ensure CSS is processed
                setTimeout(() => {
                    document.body.innerHTML = doc.body.innerHTML;
                    
                    // Copy body attributes
                    Array.from(doc.body.attributes).forEach(attr => {
                        document.body.setAttribute(attr.name, attr.value);
                    });

                    console.log('🎉 Oriana content loaded with styling!');

                    // Initialize scripts after everything is loaded
                    setTimeout(() => {
                        if (typeof initBackground === 'function') {
                            try { initBackground(); } catch(e) { console.log('Background init:', e); }
                        }
                        if (typeof initCharts === 'function') {
                            try { initCharts(); } catch(e) { console.log('Charts init:', e); }
                        }
                    }, 500);

                }, 100);

            } catch (error) {
                console.error('❌ Error loading content:', error);
                document.getElementById('loading-screen').innerHTML = `
                    <div style="text-align: center; max-width: 400px;">
                        <h2 style="color: #ef4444; margin-bottom: 1rem;">Unable to Load Content</h2>
                        <p style="margin-bottom: 1.5rem; opacity: 0.8;">Error: ${error.message}</p>
                        <button onclick="window.location.reload()" style="
                            background: #10b981; color: white; border: none;
                            padding: 12px 24px; border-radius: 6px; cursor: pointer;
                        ">Try Again</button>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadOrianaContent);
    </script>
</body>
</html>
