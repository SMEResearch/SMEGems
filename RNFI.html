<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNFI Services - SME Gems Deck</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    
    <style>
        /* --- CORE CSS --- */
        :root {
            --bg-dark: #0a0e17; 
            --bg-panel: #131a28;
            --accent-gold: #e5b300;
            --accent-teal: #00d2ff;
            --text-main: #f8f9fa;
            --text-muted: #9aa5b1;
            --danger: #ff4757;
            --border-color: rgba(255,255,255,0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* MOBILE SCROLL FIX 1: Lock body to exact screen dimensions */
        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            width: 100%;
            height: 100%;
            overflow: hidden; 
            /* Security: Disable Selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* MOBILE SCROLL FIX 2: Ensure internal container flexes properly */
        #secure-app-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            background: var(--bg-panel);
            padding: 1rem 1.5rem;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 99;
        }

        .menu-toggle {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .mobile-brand { font-size: 1.2rem; font-weight: 800; color: var(--text-main); }
        .mobile-brand span { color: var(--accent-gold); }

        /* Sidebar Navigation */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            border-right: 1px solid var(--border-color);
            z-index: 100;
            overflow-y: auto; 
            transition: left 0.3s ease;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* OVERLAY FIX: Added the .active class to make the shadow visible */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 90; backdrop-filter: blur(2px);
        }
        .sidebar-overlay.active {
            display: block; 
        }

        .brand-logo {
            padding: 0 2rem 2rem 2rem; border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem; flex-shrink: 0;
        }
        .brand-logo h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: 1px; }
        .brand-logo span { color: var(--accent-gold); }

        .nav-item {
            padding: 1rem 2rem; color: var(--text-muted); cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 15px; font-weight: 600; font-size: 0.95rem;
            border-left: 4px solid transparent; flex-shrink: 0;
        }
        .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
        .nav-item.active { color: var(--accent-teal); background: rgba(0, 210, 255, 0.05); border-left-color: var(--accent-teal); }

        /* Main Content Area */
        .main-container {
            flex: 1; padding: 2.5rem 4rem; overflow-y: auto; scroll-behavior: smooth;
            height: 100%;
            /* MOBILE SCROLL FIX 3: Native momentum scrolling on iOS */
            -webkit-overflow-scrolling: touch; 
        }

        .slide { display: none; animation: fadeIn 0.4s ease; max-width: 1150px; margin: 0 auto; }
        .slide.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block; background: rgba(229, 179, 0, 0.12); color: var(--accent-gold);
            padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; margin-bottom: 1rem; text-transform: uppercase;
        }

        .title { font-size: 2.4rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.2; }
        .subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2.5rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

        .card {
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 1.8rem; position: relative; overflow: hidden;
        }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent-teal); opacity: 0.8; }
        .card.gold-border::before { background: var(--accent-gold); }
        .card.danger-border::before { background: var(--danger); }

        .metric-value { font-size: 2.2rem; font-weight: 800; color: var(--text-main); margin: 0.5rem 0; }
        .metric-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .highlight-teal { color: var(--accent-teal); font-weight: 600; }
        .highlight-gold { color: var(--accent-gold); font-weight: 600; }

        ul.custom-list { list-style: none; }
        ul.custom-list li { position: relative; padding-left: 1.8rem; margin-bottom: 1rem; line-height: 1.6; color: #dcdde1; font-size: 0.95rem; }
        ul.custom-list li::before { content: '\f101'; font-family: 'FontAwesome'; position: absolute; left: 0; color: var(--accent-gold); font-size: 0.9rem; top: 4px; }

        .chart-box { background: var(--bg-panel); padding: 1.5rem; border-radius: 12px; height: 450px; border: 1px solid var(--border-color); }

        .table-custom { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .table-custom th, .table-custom td { padding: 1.2rem 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .table-custom th { color: var(--accent-teal); font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        .table-custom tr:hover { background: rgba(255,255,255,0.02); }

        .disclaimer-text { background: rgba(255, 71, 87, 0.08); border-left: 4px solid var(--danger); padding: 1.5rem; border-radius: 0 8px 8px 0; font-size: 0.9rem; line-height: 1.7; color: #f1f2f6; }
        .footer-branding { text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border-color); }
        .glossary-link { color: var(--accent-teal); border-bottom: 1px dotted var(--accent-teal); cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .glossary-link:hover { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }
        
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .text-center { text-align: center; }

        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .main-container { padding: 2rem; }
            .title { font-size: 2rem; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: -320px; top: 0; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            
            /* MOBILE SCROLL FIX 4: Add massive padding to bottom to prevent bottom cut-off */
            .main-container { 
                padding: 1.2rem; 
                padding-top: 5.5rem; 
                padding-bottom: 6rem; 
            }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; gap: 1rem; }
            .title { font-size: 1.6rem; }
            .subtitle { font-size: 0.95rem; margin-bottom: 1.5rem; }
            .metric-value { font-size: 1.8rem; }
            .card { padding: 1.2rem; }
            .chart-box { height: 300px; padding: 1rem; }
            .table-custom th, .table-custom td { padding: 0.8rem 0.5rem; font-size: 0.85rem; }
        }

        /* Security: Disable Print */
        @media print {
            body { display: none !important; }
            html::after {
                content: "Printing and saving as PDF is strictly disabled for this proprietary research.";
                font-family: 'Plus Jakarta Sans', sans-serif;
                text-align: center; display: block; padding: 50px; font-size: 20px; color: black;
            }
        }
    </style>
</head>
